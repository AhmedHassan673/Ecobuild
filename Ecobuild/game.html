<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Play - EcoBuild</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #dfe6e9; /* Neutral background behind map */
            overflow: hidden; height: 100vh; user-select: none;
        }

        .game-container {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            grid-template-rows: 70px 1fr;
            height: 100vh;
        }

        /* Top Bar: "Stone" Look */
        .top-bar {
            grid-column: 1 / -1;
            background: #636e72; color: white;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; border-bottom: 5px solid #2d3436; z-index: 20;
        }
        .game-title { font-size: 1.8rem; font-weight: bold; color: #55efc4; text-transform: uppercase; letter-spacing: 1px; text-shadow: 2px 2px 0 #2d3436; }

        .top-btn {
            padding: 10px 20px; background: #b2bec3; border: none; border-bottom: 4px solid #2d3436;
            border-radius: 10px; font-weight: bold; cursor: pointer; color: #2d3436; margin-left: 10px;
            font-family: 'Fredoka', sans-serif;
        }
        .top-btn:active { border-bottom: 0; transform: translateY(4px); }

        /* Panels: "Paper/Card" Look */
        .panel { background: #f1f2f6; overflow-y: auto; padding: 20px; border-right: 3px solid #b2bec3; }
        .right-panel { border-left: 3px solid #b2bec3; border-right: none; }
        
        h2 { color: #2d3436; text-align: center; margin-bottom: 15px; font-size: 1.3rem; text-transform: uppercase; border-bottom: 2px dashed #ccc; padding-bottom: 10px; }

        /* Category Nav */
        .cat-nav { display: flex; justify-content: space-between; background: #dfe6e9; padding: 10px; border-radius: 12px; margin-bottom: 15px; align-items: center; }
        .cat-btn { background: #0984e3; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* Building Cards */
        .grid-list { display: grid; gap: 12px; }
        .card-item {
            background: white; border: 3px solid #b2bec3; border-radius: 12px; padding: 12px;
            cursor: pointer; transition: 0.1s; position: relative;
        }
        .card-item:hover { border-color: #00b894; background: #e0fbf4; }
        .card-item.selected { border-color: #00b894; background: #bdfce6; transform: translateY(-2px); box-shadow: 0 5px 0 #00b894; }
        .card-item.locked { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }

        .b-name { font-weight: bold; color: #2d3436; font-size: 1.1rem; }
        .b-cost { color: #e17055; font-weight: bold; }

        /* Canvas */
        .game-canvas {
            background: #81ecec; /* Water color */
            overflow: auto; display: flex; align-items: center; justify-content: center;
        }
        /* The Map */
        .grid-map {
            display: grid; grid-template-columns: repeat(20, 45px); grid-template-rows: repeat(15, 45px);
            gap: 2px; background: #56ab2f; /* Gap color */
            border: 10px solid #56ab2f; border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .cell {
            background: #badc58; /* Grass */
            width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; cursor: pointer; transition: 0.1s;
        }
        .cell:hover { background: #dff9fb; }
        .cell.occupied { background: #f6e58d; }

        /* Stats */
        .stat-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 3px solid #dfe6e9; }
        .stat-box.critical { border-color: #d63031; background: #fab1a0; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { border-color: red; } }
        
        .bar-bg { height: 15px; background: #dfe6e9; border-radius: 8px; margin-top: 8px; overflow: hidden; border: 1px solid #b2bec3; }
        .bar-fill { height: 100%; transition: width 0.5s; }

        .action-btn {
            width: 100%; padding: 15px; margin-top: 10px;
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
            color: white; border-bottom: 5px solid rgba(0,0,0,0.2); font-family: 'Fredoka', sans-serif;
        }
        .btn-demo { background: #e17055; }
        .btn-demo.active { background: #d63031; border-color: #632121; transform: translateY(2px); }

        /* Floating Text */
        .float-txt { position: absolute; font-weight: bold; font-size: 1.2rem; pointer-events: none; animation: popUp 1.2s forwards; z-index: 99; text-shadow: 1px 1px 0 white; }
        @keyframes popUp { to { transform: translateY(-50px); opacity: 0; } }

        /* Message Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 100; backdrop-filter: blur(2px); }
        .msg-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 40px; border-radius: 25px; text-align: center;
            border: 5px solid #636e72; box-shadow: 0 20px 0 rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="top-bar">
            <div class="game-title">🌱 EcoBuild <span style="font-size:0.9rem; color:#b2bec3;">Sim</span></div>
            <div>
                <button class="top-btn" onclick="saveGame()">💾 Save City</button>
                <button class="top-btn" onclick="exitGame()">🏠 Menu</button>
            </div>
        </div>

        <div class="panel">
            <h2>Build Menu</h2>
            <div class="cat-nav">
                <button class="cat-btn" onclick="prevCategory()">◀</button>
                <span style="font-weight:bold; color:#555;" id="categoryName">Energy</span>
                <button class="cat-btn" onclick="nextCategory()">▶</button>
            </div>
            <div class="grid-list" id="buildingGrid"></div>
        </div>

        <div class="game-canvas">
            <div class="grid-map" id="gameGrid"></div>
        </div>

        <div class="panel right-panel">
            <h2>City Stats</h2>
            <div class="stat-box" id="moneyStat">
                <div>💰 Funds: <span id="money" style="font-weight:bold; color:#00b894; font-size:1.2rem;">$0</span></div>
            </div>
            <div class="stat-box">
                <div>⚡ Energy: <span id="energy">0</span></div>
                <div class="bar-bg"><div class="bar-fill" id="energyBar" style="width:50%; background:#fdcb6e;"></div></div>
            </div>
            <div class="stat-box">
                <div>🌿 Green Score: <span id="greenScore">0</span></div>
                <div class="bar-bg"><div class="bar-fill" id="greenBar" style="width:0%; background:#00b894;"></div></div>
            </div>
            <div class="stat-box" id="pollutionStat">
                <div>☁️ Pollution: <span id="pollution">0</span></div>
                <div class="bar-bg"><div class="bar-fill" id="pollutionBar" style="width:0%; background:#636e72;"></div></div>
            </div>
            <div class="stat-box">
                <div>🏙️ Level: <span id="cityLevel" style="color:#0984e3; font-weight:bold; font-size:1.2rem;">1</span></div>
            </div>
            
            <button class="action-btn btn-demo" id="demolishBtn" onclick="toggleDemolish()">🔨 Demolish</button>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="msg-box">
            <h2 id="msgTitle" style="margin-bottom:15px; color:#2d3436;">Alert</h2>
            <p id="msgText" style="margin-bottom:25px; font-size:1.1rem; color:#636e72;">...</p>
            <button class="top-btn" onclick="closeMessage()" style="width:100%;">Got it</button>
        </div>
    </div>

    <script>
        // GAME CONFIG
        let gameState = { money: 10000, energy: 0, greenScore: 0, pollution: 0, cityLevel: 1, grid: [], settings: {audio:true, graphics:'medium'} };
        let ui = { selected: null, demolish: false, catIdx: 0, decay: 0 };

        const categories = [
            { name: 'Energy', buildings: [
                { id:'solar', icon:'☀️', name:'Solar Panel', cost:500, energy:10, pollution:-1, green:5, unlockLevel:1 },
                { id:'wind', icon:'💨', name:'Wind Turbine', cost:800, energy:15, pollution:-2, green:8, unlockLevel:2 },
                { id:'hydro', icon:'💧', name:'Hydro Dam', cost:1500, energy:30, pollution:-4, green:15, unlockLevel:4 }
            ]},
            { name: 'Nature', buildings: [
                { id:'garden', icon:'🌺', name:'Garden', cost:200, pollution:-2, green:5, unlockLevel:1 },
                { id:'park', icon:'🌳', name:'Big Park', cost:400, pollution:-5, green:12, unlockLevel:1 },
                { id:'forest', icon:'🌲', name:'Forest', cost:800, pollution:-12, green:25, unlockLevel:3 }
            ]},
            { name: 'Industry', buildings: [
                { id:'shop', icon:'🏪', name:'Shop', cost:400, energy:-3, pollution:3, income:150, unlockLevel:1 },
                { id:'factory', icon:'🏭', name:'Factory', cost:1200, energy:-15, pollution:20, income:600, unlockLevel:3 },
                { id:'tower', icon:'🏙️', name:'Corp Tower', cost:3000, energy:-40, pollution:15, income:1500, unlockLevel:6 }
            ]},
            { name: 'Tech', buildings: [
                { id:'recycler', icon:'♻️', name:'Recycler', cost:800, pollution:-8, green:10, unlockLevel:2 },
                { id:'filter', icon:'🌫️', name:'Air Filter', cost:1500, energy:-10, pollution:-20, green:5, unlockLevel:4 }
            ]}
        ];

        window.onload = function() {
            checkSession();
            loadSettings();
            initGrid();
            if(new URLSearchParams(window.location.search).get('mode')==='continue') loadGame();
            else { renderMenu(); updateUI(); }
            setInterval(gameLoop, 30000);
        };

        function gameLoop() {
            // Economy
            let inc = 0;
            gameState.grid.flat().forEach(c => { if(c && c.income) inc += c.income; });
            if(inc > 0) {
                gameState.money += inc;
                if(Math.random()>0.7 && gameState.settings.graphics!=='low') floatText(0,0, `+$${inc}`, '#00b894');
                updateUI();
            }
            // Decay
            if(gameState.pollution > 100) {
                ui.decay++;
                document.getElementById('pollutionStat').classList.add('critical');
                if(gameState.pollution >= 200 && ui.decay%3===0) confiscate('pollution');
            } else document.getElementById('pollutionStat').classList.remove('critical');

            if(gameState.money < 0) {
                document.getElementById('moneyStat').classList.add('critical');
                if(ui.decay%2===0) confiscate('debt');
            } else document.getElementById('moneyStat').classList.remove('critical');
        }

        function confiscate(reason) {
            for(let i=0; i<50; i++) {
                let r=Math.floor(Math.random()*15), c=Math.floor(Math.random()*20);
                if(gameState.grid[r][c]) {
                    gameState.grid[r][c] = null;
                    const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
                    cell.textContent=''; cell.classList.remove('occupied');
                    floatText(r,c, reason==='debt'?'🚫 SEIZED':'☣️ RUINED', 'red');
                    updateUI(); return;
                }
            }
        }

        function initGrid() {
            const g = document.getElementById('gameGrid'); g.innerHTML=''; gameState.grid=[];
            for(let r=0;r<10;r++) {
                gameState.grid[r]=[];
                for(let c=0;c<20;c++) {
                    const d = document.createElement('div');
                    d.className='cell'; d.dataset.r=r; d.dataset.c=c;
                    d.onclick = () => clickGrid(r,c);
                    g.appendChild(d); gameState.grid[r][c]=null;
                }
            }
        }

        function clickGrid(r,c) {
            if(ui.demolish) {
                if(gameState.grid[r][c]) {
                    const b = gameState.grid[r][c];
                    gameState.money += Math.floor(b.cost/2);
                    applyStats(b, -1);
                    gameState.grid[r][c]=null;
                    renderCell(r,c,null);
                    floatText(r,c, `+$${Math.floor(b.cost/2)}`, '#00b894');
                    updateUI();
                }
                return;
            }
            if(!ui.selected) return;
            if(gameState.grid[r][c]) { floatText(r,c,'Occupied','red'); return; }
            if(gameState.money < ui.selected.cost) { floatText(r,c,'No Funds','red'); return; }
            
            gameState.money -= ui.selected.cost;
            gameState.grid[r][c] = {...ui.selected};
            applyStats(ui.selected, 1);
            renderCell(r,c,ui.selected);
            floatText(r,c, `-$${ui.selected.cost}`, '#e17055');
            
            const count = gameState.grid.flat().filter(x=>x).length;
            const newLvl = 1 + Math.floor(count/8) + Math.floor(gameState.greenScore/20);
            if(newLvl > gameState.cityLevel) {
                gameState.cityLevel = newLvl; gameState.money+=1500;
                showMessage("Level Up!", `You reached Level ${newLvl}!`);
                renderMenu();
            }
            updateUI();
        }

        function renderCell(r,c,b) {
            const el = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
            if(b) { el.textContent=b.icon; el.classList.add('occupied'); }
            else { el.textContent=''; el.classList.remove('occupied'); }
        }

        function applyStats(b, m) {
            if(b.energy) gameState.energy += b.energy*m;
            if(b.pollution) gameState.pollution += b.pollution*m;
            if(b.green) gameState.greenScore += b.green*m;
        }

        function renderMenu() {
            const cat = categories[ui.catIdx];
            document.getElementById('categoryName').textContent = cat.name;
            const con = document.getElementById('buildingGrid'); con.innerHTML='';
            cat.buildings.forEach(b => {
                const locked = gameState.cityLevel < b.unlockLevel;
                const d = document.createElement('div');
                d.className = `card-item ${locked?'locked':''}`;
                if(!locked) d.onclick = () => {
                    ui.selected=b; ui.demolish=false;
                    document.querySelectorAll('.card-item').forEach(x=>x.classList.remove('selected'));
                    d.classList.add('selected');
                    document.getElementById('demolishBtn').classList.remove('active');
                };
                d.innerHTML = `<div class="b-name">${b.icon} ${b.name}</div><div class="b-cost">$${b.cost}</div>
                               ${locked ? `<div style="color:red;font-size:0.8rem">Lvl ${b.unlockLevel}</div>` : ''}`;
                con.appendChild(d);
            });
        }

        function toggleDemolish() {
            ui.demolish = !ui.demolish; ui.selected=null;
            document.querySelectorAll('.card-item').forEach(x=>x.classList.remove('selected'));
            document.getElementById('demolishBtn').classList.toggle('active');
        }

        function updateUI() {
            document.getElementById('money').textContent = '$'+gameState.money.toLocaleString();
            document.getElementById('energy').textContent = gameState.energy;
            document.getElementById('greenScore').textContent = gameState.greenScore;
            document.getElementById('pollution').textContent = gameState.pollution;
            document.getElementById('cityLevel').textContent = gameState.cityLevel;
            
            setBar('energyBar', gameState.energy, -50, 50);
            setBar('greenBar', gameState.greenScore, 0, 200);
            setBar('pollutionBar', gameState.pollution, 0, 200);
        }
        function setBar(id, v, min, max) {
            const p = Math.max(0, Math.min(100, ((v-min)/(max-min))*100));
            document.getElementById(id).style.width = p+'%';
        }
        
        function floatText(r,c,t,col) {
            const el = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
            if(!el) return;
            const d = document.createElement('div'); d.className='float-txt';
            d.textContent=t; d.style.color=col;
            const rect = el.getBoundingClientRect();
            d.style.left=rect.left+'px'; d.style.top=rect.top+'px';
            document.body.appendChild(d);
            setTimeout(()=>d.remove(), 1000);
        }

        function showMessage(t,m) {
            document.getElementById('msgTitle').textContent=t; document.getElementById('msgText').textContent=m;
            document.getElementById('overlay').style.display='block';
        }
        function closeMessage() { document.getElementById('overlay').style.display='none'; }
        
        function prevCategory() { ui.catIdx=(ui.catIdx-1+4)%4; renderMenu(); }
        function nextCategory() { ui.catIdx=(ui.catIdx+1)%4; renderMenu(); }
        
        // System
        async function loadSettings() { try{const r=await fetch('php/get_settings.php'); const d=await r.json(); if(d.success) gameState.settings=d.settings;}catch(e){} }
        function checkSession() { fetch('php/check_session.php').then(r=>r.json()).then(d=>{if(!d.logged_in)window.location.href='index.html'}); }
        function saveGame() {
            const fd = new URLSearchParams();
            fd.append('game_state', JSON.stringify(gameState));
            fd.append('city_level', gameState.cityLevel);
            fd.append('green_score', gameState.greenScore);
            fd.append('money', gameState.money);
            fetch('php/save_game.php', {method:'POST', body:fd}).then(r=>r.json()).then(d=>showMessage(d.success?'Saved':'Error', d.message));
        }
        function loadGame() {
            fetch('php/load_game.php').then(r=>r.json()).then(d=>{
                if(d.success) {
                    const l=JSON.parse(d.game_state);
                    gameState.money=l.money; gameState.energy=l.energy; gameState.greenScore=l.greenScore;
                    gameState.pollution=l.pollution; gameState.cityLevel=l.cityLevel; gameState.grid=l.grid;
                    for(let r=0;r<15;r++) for(let c=0;c<20;c++) renderCell(r,c,gameState.grid[r][c]);
                    updateUI(); renderMenu();
                }
            });
        }
        function exitGame() { if(confirm("Unsaved data lost. Exit?")) window.location.href='home.html'; }
    </script>
</body>
</html>
