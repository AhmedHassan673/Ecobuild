<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home - EcoBuild</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Fredoka', sans-serif;
            /* Nature Gradient */
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .menu-card {
            background: rgba(255,255,255,0.95);
            border-radius: 30px; padding: 40px;
            width: 90%; max-width: 550px;
            text-align: center;
            border: 6px solid white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .greeting { color: #56ab2f; font-weight: bold; font-size: 1.3rem; text-transform: uppercase; letter-spacing: 1px; }
        h1 { font-size: 3rem; color: #2d3436; margin-bottom: 30px; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* Chunky Menu Buttons */
        .btn {
            padding: 25px 20px; border: none; border-radius: 20px; cursor: pointer;
            font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 1.1rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
            color: white; transition: 0.1s;
        }
        .btn:active { transform: translateY(4px); border-bottom-width: 0 !important; }

        .btn-play {
            grid-column: span 2; background: #00b894; border-bottom: 6px solid #006266; font-size: 1.5rem;
        }
        .btn-new { background: #0984e3; border-bottom: 6px solid #06528f; }
        .btn-leader { background: #fdcb6e; border-bottom: 6px solid #e17055; color: #2d3436; }
        .btn-settings { background: #b2bec3; border-bottom: 6px solid #636e72; color: #2d3436; }
        .btn-profile { background: #6c5ce7; border-bottom: 6px solid #4834d4; }
        
        .btn-logout {
            grid-column: span 2; margin-top: 15px; background: transparent; 
            color: #d63031; border: 3px solid #fab1a0; padding: 15px;
        }
        .btn-logout:hover { background: #ffeaa7; }
        
        .icon { font-size: 2rem; display: block; }
    </style>
</head>
<body>
    <div class="menu-card">
        <div class="greeting" id="userGreeting">Loading...</div>
        <h1>Main Menu</h1>
        
        <div class="menu-grid">
            <button class="btn btn-play" onclick="checkAndLoadGame()">
                <span class="icon">▶️</span> Continue City
            </button>
            
            <button class="btn btn-new" onclick="newGame()">
                <span class="icon">🆕</span> New Game
            </button>
            
            <button class="btn btn-leader" onclick="location.href='leaderboard.html'">
                <span class="icon">🏆</span> Leaderboard
            </button>
            
            <button class="btn btn-profile" onclick="location.href='profile.html'">
                <span class="icon">👤</span> Profile
            </button>

            <button class="btn btn-settings" onclick="location.href='settings.html'">
                <span class="icon">⚙️</span> Settings
            </button>

            <button class="btn btn-logout" onclick="logout()">Log Out</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            fetch('php/check_session.php').then(r => r.json()).then(data => {
                if(!data.logged_in) window.location.href = 'index.html';
                else document.getElementById('userGreeting').textContent = `Mayor ${data.user.username}`;
            });
        }
        function checkAndLoadGame() {
            fetch('php/check_saved_game.php').then(r => r.json()).then(d => {
                if(d.has_save) window.location.href = 'game.html?mode=continue';
                else if(confirm("No save found. Start new?")) window.location.href = 'game.html?mode=new';
            });
        }
        function newGame() {
            if(confirm("Start fresh? Previous city will be lost.")) window.location.href = 'game.html?mode=new';
        }
        function logout() { fetch('php/logout.php').then(() => window.location.href = 'index.html'); }
    </script>
</body>
</html>
